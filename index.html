<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws & Polish | Site Under Construction</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Fredoka:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --primary-orange: #FF8D4D;
            --soft-yellow: #FFD93D;
            --cream: #FFF9F0;
            --dark: #2D2D2D;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--cream);
            overflow-x: hidden;
        }

        .cone-eye {
            animation: blink 4s infinite;
        }

        @keyframes blink {

            0%,
            96%,
            100% {
                transform: scaleY(1);
            }

            98% {
                transform: scaleY(0);
            }
        }

        .float-animation {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(-2deg);
            }

            50% {
                transform: translateY(-20px) rotate(2deg);
            }
        }

        .shadow-glow {
            width: 140px;
            height: 20px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 50%;
            filter: blur(8px);
            margin: 0 auto;
            animation: shadow-width 4s ease-in-out infinite;
        }

        @keyframes shadow-width {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
            }

            50% {
                transform: scale(0.8);
                opacity: 1;
            }
        }

        .bubbly-text {
            background: linear-gradient(135deg, #FF8D4D 0%, #FFB344 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .confetti {
            position: absolute;
            pointer-events: none;
        }
    </style>
</head>

<body x-data="{}">

    <!-- Playful Background -->
    <div class="fixed inset-0 overflow-hidden -z-10">
        <div class="absolute top-10 left-10 w-32 h-32 bg-orange-200 rounded-full blur-3xl opacity-60"></div>
        <div class="absolute bottom-20 right-10 w-64 h-64 bg-yellow-200 rounded-full blur-3xl opacity-50"></div>
    </div>

    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">

        <!-- Kawaii Cone Character (SVG) -->
        <div class="relative mb-8" id="character">
            <div class="float-animation relative z-10">
                <svg width="220" height="240" viewBox="0 0 220 240" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Base -->
                    <rect x="30" y="190" width="160" height="30" rx="15" fill="#FF8D4D" />
                    <rect x="40" y="185" width="140" height="10" rx="5" fill="#E67E42" />

                    <!-- Cone Body -->
                    <path d="M110 20L190 190H30L110 20Z" fill="#FF8D4D" />

                    <!-- Reflector White Bands -->
                    <path d="M85 70L135 70L145 92L75 92L85 70Z" fill="white" fill-opacity="0.9" />
                    <path d="M65 130L155 130L165 155L55 155L65 130Z" fill="white" fill-opacity="0.9" />

                    <!-- Cute Face -->
                    <g class="face">
                        <!-- Left Eye -->
                        <circle cx="95" cy="115" r="5" fill="#2D2D2D" class="cone-eye" />
                        <!-- Right Eye -->
                        <circle cx="125" cy="115" r="5" fill="#2D2D2D" class="cone-eye" />
                        <!-- Cheeks -->
                        <circle cx="85" cy="120" r="4" fill="#FFB6B6" opacity="0.6" />
                        <circle cx="135" cy="120" r="4" fill="#FFB6B6" opacity="0.6" />
                        <!-- Mouth -->
                        <path d="M102 125C102 125 110 130 118 125" stroke="#2D2D2D" stroke-width="2"
                            stroke-linecap="round" />
                    </g>

                    <!-- Hard Hat -->
                    <path d="M80 40C80 25 140 25 140 40L145 45L75 45L80 40Z" fill="#FFD93D" />
                    <path d="M70 45H150L155 52H65L70 45Z" fill="#F4C724" />
                </svg>
            </div>
            <div class="shadow-glow"></div>
        </div>

        <!-- Content -->
        <div class="max-w-xl space-y-6" id="text-reveal">
            <h1 class="text-5xl md:text-7xl font-black italic tracking-tighter bubbly-text uppercase leading-none">
                Under <br> <span class="text-[#2D2D2D]">Construction</span>
            </h1>

            <p class="text-lg md:text-xl text-[#666] font-medium leading-relaxed max-w-sm mx-auto">
                Please be patient! I'm busy crafting some magic for you. This tiny cone is doing his best!
            </p>
        </div>
    </div>
</body>

</html>
